# Windows configuration for Hyprland
# Format: windowrulev2 = [float|fullscreen], class=WindowClass

# Example floating windows
windowrulev = float, class=Calculator
windowrulev = float, class=Zenity

# Example fullscreen windows
windowrulev = fullscreen, class=mpv
windowrulev = fullscreen, class=Steam

# Add your own app rules below
# windowrulev = float, class=YourApp
# windowrulev = fullscreen, class=AnotherApp
